services:
  web_django:
    build: .
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn Tienda.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - sqlite_data:/data
      - static_data:/app/staticfiles
    expose:
      - "8000"
    environment:
      SQLITE_PATH: /data/db.sqlite3
      ALLOWED_HOSTS: "*"

  pagos_flask:
    build: ./microservicio_pagos
    ports:
      - "5000:5000"

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_data:/staticfiles:ro
    depends_on:
      - web_django
      - pagos_flask

volumes:
  sqlite_data:
  static_data: