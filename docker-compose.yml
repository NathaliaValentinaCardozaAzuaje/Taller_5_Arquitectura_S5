services:
  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn Tienda.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - sqlite_data:/data
    expose:
      - "8000"
    environment:
      SQLITE_PATH: /data/db.sqlite3
      ALLOWED_HOSTS: "*"

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  sqlite_data: